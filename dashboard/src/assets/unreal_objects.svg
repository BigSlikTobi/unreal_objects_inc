<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(300, 230)">
    <path d="M -90 -80 L -130 -40 L -130 50 C -130 110 -60 160 0 180 L -35 125 C -70 110 -90 80 -90 50 Z" 
          fill="url(#primaryGrad)" />
          
    <path d="M 90 -80 L 130 -40 L 130 50 C 130 110 60 160 0 180 L 35 125 C 70 110 90 80 90 50 Z" 
          fill="url(#primaryGrad)" />

    <circle cx="0" cy="20" r="50" fill="none" stroke="url(#secondaryGrad)" stroke-width="18" filter="url(#glow)"/>
    
    <circle cx="0" cy="20" r="16" fill="#00F0FF" filter="url(#glow)"/>
  </g>

  <g transform="translate(300, 480)" font-family="'Space Grotesk', 'Montserrat', 'Helvetica Neue', 'Inter', sans-serif">
    
    <text x="0" y="0" text-anchor="middle" font-size="46" font-weight="900" fill="#1e293b" letter-spacing="10">
      UNREAL<tspan fill="url(#primaryGrad)">OBJECTS</tspan>
    </text>
    
    <path d="M -180 30 L 180 30" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />
    <rect x="-40" y="28" width="80" height="4" rx="2" fill="url(#secondaryGrad)" />
  </g>
</svg>
