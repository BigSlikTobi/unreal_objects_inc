# Railway deployment configuration
#
# This project deploys two services (+ 1 local agent):
#
#   CLOUD (Railway — athletic-spirit project)
#   ─────────────────────────────────────────
#   1. company    — Simulation API (Dockerfile.company.api, port 8010)
#                   Volume "company-volume" mounted at /data
#                   PERSISTENCE_PATH=/data/state.json
#
#   2. dashboard  — Static React UI (Dockerfile.dashboard, port 80)
#                   Build var: VITE_API_BASE=https://unrealobjectsinc.up.railway.app/api/v1
#
#   EXTERNAL (Railway — unreal_objects project, deployed separately)
#   ────────────────────────────────────────────────────────────────
#   Rule Engine, Decision Center, MCP, UI — managed in the unreal_objects repo
#
#   LOCAL (Raspberry Pi / dev machine)
#   ──────────────────────────────────
#   worker  — Autonomous bot agent (worker/unreal_worker.py)
#
# ── Build configuration ──────────────────────────────────────────
#
# After connecting each service to this GitHub repo in the Railway UI,
# set the Dockerfile path per service:
#   company   → Dockerfile.company.api
#   dashboard → Dockerfile.dashboard
#
# ── Environment Variables ────────────────────────────────────────
#
# [company]
#   DEPLOYMENT_MODE=hosted
#   GENERATOR_MODE=template
#   ACCELERATION=2
#   DECISION_CENTER_URL=https://decisioncenter-production-1c81.up.railway.app
#   INTERNAL_API_KEY=<shared-secret matching unreal_objects project>
#   ENVIRONMENT=production
#   PERSISTENCE_PATH=/data/state.json   ← Volume "company-volume" mounted at /data
#   OPERATOR_AUTH=true
#   OPERATOR_TOKEN=<secret>
#
# [dashboard]
#   VITE_API_BASE=https://unrealobjectsinc.up.railway.app/api/v1
#
# [local worker — NOT on Railway]
#   COMPANY_API_URL=https://unrealobjectsinc.up.railway.app
#   DECISION_CENTER_URL=https://decisioncenter-production-1c81.up.railway.app
#   BOT_ID=deborahbot3000
#   POLL_INTERVAL=5
#
# See docs/deployment-railway.md for the full step-by-step guide.
