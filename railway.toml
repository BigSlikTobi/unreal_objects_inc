# Railway deployment configuration
#
# This project deploys as a single service (+ 1 local agent):
#
#   CLOUD (Railway — athletic-spirit project)
#   ─────────────────────────────────────────
#   1. company  — Company API + Dashboard (public, Dockerfile.company)
#
#   EXTERNAL (Railway — unreal_objects project, deployed separately)
#   ────────────────────────────────────────────────────────────────
#   Rule Engine, Decision Center, MCP, UI — managed in the unreal_objects repo
#
#   LOCAL (Raspberry Pi / dev machine)
#   ──────────────────────────────────
#   worker  — Autonomous bot agent (worker/unreal_worker.py)
#
# ── Environment Variables ────────────────────────────────────────
#
# [company]
#   DEPLOYMENT_MODE=hosted
#   GENERATOR_MODE=template
#   ACCELERATION=10
#   RULE_ENGINE_URL=https://ruleengine-production-d6fe.up.railway.app
#   DECISION_CENTER_URL=https://decisioncenter-production-1c81.up.railway.app
#   INTERNAL_API_KEY=<shared-secret matching unreal_objects project>
#   ENVIRONMENT=production
#
# [local worker — NOT on Railway]
#   COMPANY_API_URL=https://unrealobjectsinc-production.up.railway.app
#   DECISION_CENTER_URL=https://decisioncenter-production-1c81.up.railway.app
#   BOT_ID=deborahbot3000
#   POLL_INTERVAL=5
#
# See docs/deployment-railway.md for the full step-by-step guide.
